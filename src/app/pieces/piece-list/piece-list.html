<div class="page-container">
  <div class="page-header">
    <div class="header-left">
      <button mat-icon-button (click)="goBack()"><mat-icon>arrow_back</mat-icon></button>
      <div>
        <h1>Pièces de rechange</h1>
        <p>{{ filtered.length }} pièce(s)</p>
      </div>
    </div>
    <button mat-raised-button color="primary" (click)="goToNew()">
      <mat-icon>add</mat-icon> Nouvelle pièce
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Rechercher...</mat-label>
    <input matInput [(ngModel)]="search" (input)="applyFilter()">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div *ngIf="isLoading" class="center-state">
    <mat-spinner diameter="48"></mat-spinner><p>Chargement...</p>
  </div>

  <div *ngIf="!isLoading && !hasError">
    <div *ngIf="filtered.length === 0" class="empty-state"><p>Aucune pièce trouvée.</p></div>
    <table *ngIf="filtered.length > 0" mat-table [dataSource]="filtered" class="mat-elevation-z2">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let row">{{ row.nom }}</td>
      </ng-container>
      <ng-container matColumnDef="reference">
        <th mat-header-cell *matHeaderCellDef>Référence</th>
        <td mat-cell *matCellDef="let row">{{ row.reference }}</td>
      </ng-container>
      <ng-container matColumnDef="quantiteStock">
        <th mat-header-cell *matHeaderCellDef>Stock</th>
        <td mat-cell *matCellDef="let row">
          <span class="stock-badge" [ngClass]="getStockClass(row.quantiteStock)">{{ row.quantiteStock }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="prixUnitaire">
        <th mat-header-cell *matHeaderCellDef>Prix unitaire</th>
        <td mat-cell *matCellDef="let row">{{ row.prixUnitaire | number:'1.2-2' }} DH</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="goToDetail(row.id)"><mat-icon>visibility</mat-icon></button>
          <button mat-icon-button color="primary" (click)="goToEdit(row.id, $event)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(row.id, $event)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="clickable-row" (click)="goToDetail(row.id)"></tr>
    </table>
  </div>
</div>
