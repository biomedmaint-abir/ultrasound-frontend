<div class="page-container">
  <div class="page-header">
    <button mat-icon-button (click)="cancel()"><mat-icon>arrow_back</mat-icon></button>
    <div>
      <h1>{{ isEditMode ? 'Modifier l\'équipement' : 'Nouvel équipement' }}</h1>
    </div>
  </div>
  <mat-card class="form-card">
    <mat-card-content>
      <div *ngIf="errorMessage" class="error-banner">
        <mat-icon>error_outline</mat-icon> {{ errorMessage }}
      </div>
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Modèle</mat-label>
          <input matInput [(ngModel)]="form.nom" name="nom">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Numéro de série</mat-label>
          <input matInput [(ngModel)]="form.numeroSerie" name="numeroSerie">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>N° Inventaire</mat-label>
          <input matInput [(ngModel)]="form.numInventaire" name="numInventaire">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Service</mat-label>
          <input matInput [(ngModel)]="form.service" name="service">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Parc</mat-label>
          <input matInput [(ngModel)]="form.parc" name="parc">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Date d'installation</mat-label>
          <input matInput type="date" [(ngModel)]="form.dateInstallation" name="dateInstallation">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Statut</mat-label>
          <mat-select [(ngModel)]="form.statut" name="statut">
            <mat-option *ngFor="let s of statuts" [value]="s">{{ s }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button (click)="cancel()" [disabled]="isSaving">Annuler</button>
      <button mat-raised-button color="primary" (click)="save()" [disabled]="isSaving">
        <mat-icon *ngIf="!isSaving">save</mat-icon>
        {{ isSaving ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
